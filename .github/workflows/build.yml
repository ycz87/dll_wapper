name: Build ADPSS DLL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (x86 32-bit)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure CMake (MSVC x86)
        run: cmake -B build -G "NMake Makefiles"

      - name: Build DLL
        run: cmake --build build

      - name: Verify DLL architecture
        run: dumpbin /headers build\adpss_*.dll | findstr "machine"

      - name: Verify DLL exports
        run: dumpbin /exports build\adpss_*.dll

      - name: Verify DLL dependencies
        run: dumpbin /dependents build\adpss_*.dll

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: adpss-dll
          path: build/*.dll
